<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>思い出の謎解き</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 画面共通 */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      text-align: center;
    }
    .screen.active { display: flex; }

    /* スタート画面 */
    #start-screen .title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #start-screen .subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 48px;
    }

    /* 問題画像 */
    .progress { font-size: 0.9rem; color: #aaa; margin-bottom: 16px; }
    .puzzle-image-wrapper { width: 100%; margin-bottom: 24px; }
    .puzzle-image-wrapper img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    /* 回答エリア */
    .answer-area { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .answer-input {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      border: 2px solid #444;
      border-radius: 12px;
      background: #16213e;
      color: #eee;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }
    .answer-input:focus { border-color: #f5af19; }
    .answer-input.shake { animation: shake 0.4s ease; border-color: #e74c3c; }
    .error-msg { color: #e74c3c; font-size: 0.9rem; min-height: 1.4em; }

    /* ボタン */
    .btn {
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #f5af19, #f12711); color: #fff; }
    .btn-submit { width: 100%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-secondary { background: #333; color: #eee; margin-top: 12px; }

    /* 正解オーバーレイ */
    .correct-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .correct-overlay.show { display: flex; }
    .correct-text { font-size: 3rem; font-weight: bold; color: #2ecc71; animation: popIn 0.5s ease; }

    /* クリア画面 */
    #clear-screen .clear-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 16px; animation: popIn 0.6s ease; }
    #clear-screen .clear-message { font-size: 1.1rem; color: #ccc; line-height: 1.8; margin-bottom: 40px; }
    .map-section { width: 100%; margin-bottom: 24px; }
    .map-lead { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; color: #f5af19; }

    /* 指示画面 */
    #direction-screen .direction-msg { font-size: 1.2rem; line-height: 2; margin-bottom: 40px; }

    /* 途中から画面 */
    #resume-screen .resume-msg { font-size: 1rem; color: #aaa; margin-bottom: 24px; line-height: 1.8; }

    /* 振り返り画面 */
    #review-screen .review-header { font-size: 1rem; color: #aaa; margin-bottom: 16px; }

    /* 桜演出 */
    .sakura-container { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
    .sakura { position: absolute; top: -40px; animation: sakuraFall linear forwards; }

    /* ハンバーガーメニュー */
    .hamburger-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 200;
      width: 44px;
      height: 44px;
      background: rgba(22, 33, 62, 0.85);
      border: 1px solid #444;
      border-radius: 10px;
      cursor: pointer;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn.visible { display: flex; }
    .hamburger-btn span {
      display: block; width: 22px; height: 2px;
      background: #eee; border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* サイドドロワー */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; left: 0;
      width: 280px; max-width: 80%; height: 100%;
      background: #16213e; z-index: 160;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      overflow-y: auto; padding: 72px 16px 24px;
    }
    .drawer.open { transform: translateX(0); }
    .drawer h2 { font-size: 1rem; color: #aaa; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #333; }
    .drawer-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .drawer-item { padding: 12px 14px; border-radius: 10px; font-size: 0.95rem; cursor: default; color: #666; background: #1a1a2e; }
    .drawer-item.solved { color: #eee; cursor: pointer; transition: background 0.15s; }
    .drawer-item.solved:active { background: #2a2a4e; }
    .drawer-item .item-label { display: flex; align-items: center; gap: 8px; }
    .drawer-item .item-icon { font-size: 1.1rem; }

    /* ヒントボタン */
    .hint-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 80;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      display: none;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px rgba(245, 175, 25, 0.4);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
    }
    .hint-btn.visible { display: flex; }
    .hint-btn:active { transform: scale(0.9); }

    /* ヒント選択画面 */
    #hint-select-screen .hint-title { font-size: 1.2rem; margin-bottom: 24px; color: #f5af19; }
    .hint-list { list-style: none; width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .hint-list-item {
      padding: 14px;
      border-radius: 10px;
      background: #16213e;
      border: 1px solid #444;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hint-list-item:active { background: #2a2a4e; }

    /* ヒント表示画面 */
    #hint-view-screen .hint-header { font-size: 1rem; color: #aaa; margin-bottom: 16px; }

    /* アニメーション */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes sakuraFall { to { top: 110vh; transform: rotate(360deg) translateX(60px); } }
  </style>
</head>
<body>

  <!-- ハンバーガーボタン -->
  <button class="hamburger-btn" id="hamburger-btn" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </button>

  <!-- ドロワー -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <h2>解いた問題</h2>
    <ul class="drawer-list" id="drawer-list"></ul>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen" class="screen active">
    <div class="title">思い出の謎解き</div>
    <div class="subtitle">謎を解いて今日の目的地に向かおう！</div>
    <button class="btn btn-primary" onclick="startGame()">スタート</button>
    <button class="btn btn-secondary" onclick="showResumeScreen()">途中から</button>
  </div>

  <!-- 途中から画面 -->
  <div id="resume-screen" class="screen">
    <div class="resume-msg">再開したい問題の<br>ひとつ前の答えを入力してください</div>
    <div class="answer-area">
      <input type="text" class="answer-input" id="resume-input" placeholder="答えを入力" autocomplete="off">
      <div class="error-msg" id="resume-error"></div>
      <button class="btn btn-submit" onclick="submitResume()">再開する</button>
      <button class="btn btn-secondary" onclick="showScreen('start-screen')">戻る</button>
    </div>
  </div>

  <!-- 問題画面 -->
  <div id="puzzle-screen" class="screen">
    <div class="progress" id="progress"></div>
    <div class="puzzle-image-wrapper">
      <img id="puzzle-image" src="" alt="問題画像">
    </div>
    <div class="answer-area">
      <input type="text" class="answer-input" id="answer-input" placeholder="こたえを入力" autocomplete="off">
      <div class="error-msg" id="error-msg"></div>
      <button class="btn btn-submit" onclick="submitAnswer()">回答する</button>
    </div>
  </div>

  <!-- ヒントボタン -->
  <button class="hint-btn" id="hint-btn" onclick="showHintSelect()">&#x1F4A1;</button>

  <!-- ヒント選択画面 -->
  <div id="hint-select-screen" class="screen">
    <div class="hint-title">ヒントを選んでね</div>
    <ul class="hint-list" id="hint-list"></ul>
    <button class="btn btn-secondary" onclick="closeHintSelect()">戻る</button>
  </div>

  <!-- ヒント表示画面 -->
  <div id="hint-view-screen" class="screen">
    <div class="hint-header" id="hint-header"></div>
    <div class="puzzle-image-wrapper">
      <img id="hint-image" src="" alt="ヒント画像">
    </div>
    <button class="btn btn-secondary" onclick="showHintSelect()">ヒント一覧に戻る</button>
  </div>

  <!-- 指示画面 -->
  <div id="direction-screen" class="screen">
    <div class="direction-msg" id="direction-msg"></div>
    <button class="btn btn-primary" onclick="advanceToNext()">OK！</button>
  </div>

  <!-- 正解オーバーレイ -->
  <div class="correct-overlay" id="correct-overlay">
    <div class="correct-text">&#x2B50; 正解！</div>
  </div>

  <!-- 振り返り画面 -->
  <div id="review-screen" class="screen">
    <div class="review-header" id="review-header"></div>
    <div class="puzzle-image-wrapper">
      <img id="review-image" src="" alt="問題画像">
    </div>
    <button class="btn btn-secondary" onclick="closeReview()">戻る</button>
  </div>

  <!-- クリア画面 -->
  <div id="clear-screen" class="screen">
    <div class="clear-title">&#x1F389; クリア！ &#x1F389;</div>
    <div class="clear-message">
      わかちゃん<br>
      全問正解おめでとう！<br>
      すべての謎を解き明かしました！
    </div>
    <div class="map-section">
      <p class="map-lead">この場所に向かおう！</p>
      <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3242.073366926581!2d139.760365!3d35.650564!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188bcdc90d6721%3A0x2324854e4fa9520c!2z44K344Oz44OV44Kp44OL44O844Kv44Or44O844K6!5e0!3m2!1sja!2sus!4v1771667919879!5m2!1sja!2sus" width="100%" height="250" style="border:0; border-radius:12px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <button class="btn btn-primary" onclick="resetGame()">もう一度</button>
  </div>

  <div class="sakura-container" id="sakura-container"></div>

  <script src="puzzles.js"></script>
  <script>
    var currentIndex = 0;
    var solvedSet = {};
    var isProcessing = false;

    // 問題間に挟む指示（afterPuzzle: 0始まりのインデックス）
    var DIRECTION_MAP = { 0: '初めて手をつないだ日に\nデートした場所の公園の展望デッキに向かって！' };

    // DOM要素キャッシュ
    var $ = document.getElementById.bind(document);
    var $progress     = $('progress');
    var $puzzleImage  = $('puzzle-image');
    var $answerInput  = $('answer-input');
    var $errorMsg     = $('error-msg');
    var $hamburgerBtn = $('hamburger-btn');
    var $drawer       = $('drawer');
    var $drawerOverlay = $('drawer-overlay');
    var $drawerList   = $('drawer-list');
    var $correctOverlay = $('correct-overlay');
    var $reviewHeader = $('review-header');
    var $reviewImage  = $('review-image');
    var $sakuraContainer = $('sakura-container');
    var $resumeInput  = $('resume-input');
    var $resumeError  = $('resume-error');
    var $directionMsg = $('direction-msg');
    var $hintBtn      = $('hint-btn');
    var $hintList     = $('hint-list');
    var $hintHeader   = $('hint-header');
    var $hintImage    = $('hint-image');

    // --- ユーティリティ ---

    function normalizeAnswer(str) {
      return str.trim()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(ch) {
          return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
        })
        .toLowerCase();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      $(id).classList.add('active');
    }

    function shakeInput(inputEl, errorEl, msg) {
      errorEl.textContent = msg;
      inputEl.classList.remove('shake');
      void inputEl.offsetWidth;
      inputEl.classList.add('shake');
    }

    function resetState() {
      currentIndex = 0;
      solvedSet = {};
      updateHamburger();
    }

    // --- ゲーム制御 ---

    function startGame() {
      resetState();
      showScreen('puzzle-screen');
      loadPuzzle();
      $answerInput.focus();
    }

    function resetGame() {
      resetState();
      showScreen('start-screen');
    }

    function loadPuzzle() {
      var puzzle = PUZZLES[currentIndex];
      $progress.textContent = '第 ' + (currentIndex + 1) + ' 問 / 全 ' + PUZZLES.length + ' 問';
      $puzzleImage.src = puzzle.image;
      $answerInput.value = '';
      $errorMsg.textContent = '';
      $answerInput.classList.remove('shake');
      $hintBtn.classList.toggle('visible', !!HINTS[currentIndex]);
    }

    function advanceToNext() {
      if (currentIndex >= PUZZLES.length) {
        showScreen('clear-screen');
        launchSakura();
      } else {
        showScreen('puzzle-screen');
        loadPuzzle();
        $answerInput.focus();
      }
    }

    function submitAnswer() {
      if (isProcessing) return;
      var userAnswer = normalizeAnswer($answerInput.value);
      if (userAnswer === '') return;

      if (userAnswer === normalizeAnswer(PUZZLES[currentIndex].answer)) {
        showCorrectEffect();
      } else {
        shakeInput($answerInput, $errorMsg, '不正解… もう一度考えてみよう！');
      }
    }

    function showCorrectEffect() {
      isProcessing = true;
      solvedSet[currentIndex] = true;
      updateHamburger();
      $correctOverlay.classList.add('show');

      var directionMsg = DIRECTION_MAP[currentIndex];

      setTimeout(function() {
        $correctOverlay.classList.remove('show');
        currentIndex++;
        isProcessing = false;

        if (directionMsg) {
          $directionMsg.textContent = directionMsg;
          showScreen('direction-screen');
        } else {
          advanceToNext();
        }
      }, 1200);
    }

    // --- ヒント ---

    function showHintSelect() {
      var hints = HINTS[currentIndex];
      if (!hints) return;
      $hintBtn.classList.remove('visible');
      $hamburgerBtn.classList.remove('visible');
      $hintList.innerHTML = '';
      for (var i = 0; i < hints.length; i++) {
        var li = document.createElement('li');
        li.className = 'hint-list-item';
        li.textContent = 'ヒント ' + (i + 1);
        li.addEventListener('click', showHintView.bind(null, i));
        $hintList.appendChild(li);
      }
      showScreen('hint-select-screen');
    }

    function showHintView(hintIdx) {
      var hints = HINTS[currentIndex];
      $hintHeader.textContent = 'ヒント ' + (hintIdx + 1);
      $hintImage.src = hints[hintIdx];
      showScreen('hint-view-screen');
    }

    function closeHintSelect() {
      $hintBtn.classList.toggle('visible', !!HINTS[currentIndex]);
      updateHamburger();
      showScreen('puzzle-screen');
    }

    // --- 途中から再開 ---

    function showResumeScreen() {
      $resumeInput.value = '';
      $resumeError.textContent = '';
      showScreen('resume-screen');
      $resumeInput.focus();
    }

    function submitResume() {
      var userAnswer = normalizeAnswer($resumeInput.value);
      if (userAnswer === '') return;

      for (var i = 0; i < PUZZLES.length; i++) {
        if (userAnswer === normalizeAnswer(PUZZLES[i].answer)) {
          currentIndex = i + 1;
          solvedSet = {};
          for (var j = 0; j <= i; j++) solvedSet[j] = true;
          updateHamburger();
          advanceToNext();
          return;
        }
      }
      shakeInput($resumeInput, $resumeError, 'どの問題の答えとも一致しません');
    }

    // --- ハンバーガーメニュー / ドロワー ---

    function updateHamburger() {
      $hamburgerBtn.classList.toggle('visible', Object.keys(solvedSet).length > 0);
    }

    function toggleDrawer() {
      if ($drawer.classList.contains('open')) {
        closeDrawer();
      } else {
        buildDrawerList();
        $drawer.classList.add('open');
        $drawerOverlay.classList.add('open');
        $hamburgerBtn.classList.add('open');
      }
    }

    function closeDrawer() {
      $drawer.classList.remove('open');
      $drawerOverlay.classList.remove('open');
      $hamburgerBtn.classList.remove('open');
    }

    function buildDrawerList() {
      $drawerList.innerHTML = '';
      for (var i = 0; i < PUZZLES.length; i++) {
        var solved = !!solvedSet[i];
        var li = document.createElement('li');
        li.className = 'drawer-item' + (solved ? ' solved' : '');
        li.innerHTML = '<div class="item-label">' +
          '<span class="item-icon">' + (solved ? '\u2705' : '\uD83D\uDD12') + '</span>' +
          '<span>第 ' + (i + 1) + ' 問</span></div>';
        if (solved) li.addEventListener('click', openReview.bind(null, i));
        $drawerList.appendChild(li);
      }
    }

    // --- 振り返り画面 ---

    function openReview(idx) {
      closeDrawer();
      $reviewHeader.textContent = '第 ' + (idx + 1) + ' 問';
      $reviewImage.src = PUZZLES[idx].image;
      showScreen('review-screen');
    }

    function closeReview() {
      showScreen(currentIndex >= PUZZLES.length ? 'clear-screen' : 'puzzle-screen');
    }

    // --- 桜演出 ---

    function launchSakura() {
      $sakuraContainer.innerHTML = '';
      var petals = ['\uD83C\uDF38', '\uD83C\uDF3A', '\uD83C\uDF78'];
      for (var i = 0; i < 40; i++) {
        var el = document.createElement('div');
        el.className = 'sakura';
        el.textContent = petals[Math.floor(Math.random() * petals.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (Math.random() * 16 + 18) + 'px';
        el.style.animationDuration = (Math.random() * 3 + 3) + 's';
        el.style.animationDelay = (Math.random() * 3) + 's';
        $sakuraContainer.appendChild(el);
      }
      setTimeout(function() { $sakuraContainer.innerHTML = ''; }, 8000);
    }

    // --- イベント登録 ---

    $answerInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitAnswer(); });
    $resumeInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitResume(); });
  </script>
</body>
</html>
